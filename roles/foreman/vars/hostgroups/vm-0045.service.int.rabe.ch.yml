---
foreman_hostgroup:
  name: vm-0045.service.int.rabe.ch
  description: FreeIPA password expiration notification service
  parent: RaBe Core/RaBe Base/EL9/AlmaLinux 9/AlmaLinux 9 VMs
  organization: RaBe
  locations:
    - Sulgenrain
  ansible_roles:
    - radiorabe.common.files
    - redhat.rhel_system_roles.systemd
  parameters:
    - name: additional-packages
      parameter_type: string
      value: ipa-client-epn
    - name: radiorabe_copies
      parameter_type: yaml
      value:
        - content: |
            [Unit]
            Description=
            Description=Execute IPA Expiring Password Notification (EPN) every day at 3AM

            [Timer]
            OnCalendar=
            OnCalendar=*-*-* 03:00:00
          dest: /etc/systemd/system/ipa-epn.timer.d/override.conf
          mode: '0644'
        - content: |
            [Service]
            Environment=
            Environment=LANG=de_CH.UTF8
            # The LANG environment variable is set to a German locale to ensure
            # that the date formatting in the email matches the expected format.
          dest: /etc/systemd/system/ipa-epn.service.d/override.conf
          mode: '0644'
        - content: "# This file is a copy from https://github.com/freeipa/freeipa/blob/master/client/share/epn.conf\n#\n# Global IPA-EPN [0] configuration file.\n# For a complete explanation of each parameter, see the epn.conf(5)\n# manual page.\n# For best results, change no more than a single parameter at a time,\n# and test if ipa-epn(1) still works as intended, using --dry-run when\n# it makes sense.\n#\n# [0] https://github.com/freeipa/freeipa/blob/master/doc/designs/expiring-password-notification.md\n\n[global]\n\n# Specifies the SMTP server to use.\nsmtp_server = {{ '{{' }} smtp_server {{ '}}' }}\n\n# Specifies the SMTP port.\nsmtp_port = {{ '{{' }} smtp_port | default('25') {{ '}}' }}\n\n# Specifies the id of the user to authenticate with the SMTP server.\n# Default None (empty value).\nsmtp_user = {{ '{{' }} smtp_user {{ '}}' }}\n\n# Specifies the password for the authorized user.\n# Default None (empty value).\nsmtp_password = {{ '{{' }} smtp_password {{ '}}' }}\n\n# Specifies the path to a single file in PEM format containing the certificate.\n# https://docs.python.org/3/library/ssl.html#ssl.SSLContext.load_cert_chain\n# Default None (empty value).\n# smtp_client_cert =\n\n# Specifies the path to a file containing the private key in. Otherwise the\n# private key will be taken from certfile as well.\n# https://docs.python.org/3/library/ssl.html#ssl.SSLContext.load_cert_chain\n# Default None (empty value).\n# smtp_client_key =\n\n# Specifies the password for decrypting the private key. It will be ignored if\n# the private key is not encrypted and no password is needed.\n# https://docs.python.org/3/library/ssl.html#ssl.SSLContext.load_cert_chain\n# Default None (empty value).\n# smtp_client_key_pass =\n\n# Specifies the number of seconds to wait for SMTP to respond.\nsmtp_timeout = 60\n\n# Specifies the type of secure connection to make. Options are: none,\n# starttls and ssl.\nsmtp_security = {{ '{{' }} smtp_security | default('none') {{ '}}' }}\n\n# Specifies the From e-mail address value in the e-mails sent. Bounces will\n# be sent here.\nsmtp_admin = {{ '{{' }} smtp_admin | default('root@localhost') {{ '}}' }}\n\n# Time to wait, in milliseconds, between each e-mail sent to try to avoid\n# overloading the mail queue.\nsmtp_delay = 0\n\n# Specifies the From: e-mail address value in the e-mails sent.\n# The default when unset is noreply@ipadefaultemaildomain.\n# This value can be found by running ipa config-show.\nmail_from = {{ '{{' }} mail_from | default('noreply@ipadefaultemaildomain') {{ '}}' }}\n\n# Specifies the From: name value in the e-mails-sent.\n# The default when unset is IPA-EPN.\nmail_from_name = {{ '{{' }} mail_from_name | default('IPA-EPN') {{ '}}' }}\n\n# The list of days before a password expiration when ipa-epn should notify\n# a user that their password will soon require a reset.\nnotify_ttls = {{ '{{' }} notify_ttls | default('28, 14, 7, 3, 1') {{ '}}' }}\n\n# Set the subject of the message\nmsg_subject = {{ '{{' }} msg_subject {{ '}}' }}\n\n# Set the character set of the message.\nmsg_charset = utf8\n\n# Set the message's MIME sub-content type.\nmsg_subtype = {{ '{{' }} msg_subtype | default('plain') {{ '}}' }}\n"
          dest: /etc/ipa/epn.conf
          mode: '0600'
        - content: "<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\">\n    <meta content=\"width=device-width, initial-scale=1.0\" name=\"viewport\" />\n</head>\n<body >\n    <table style=\"background-color: #eee; font-family: 'Helvetica', 'Arial', sans-serif; padding: 20px; width: 100%; font-size: 14px;\">\n        <tr>\n            <td>\n                <center style=\"width: 100%; margin: auto; max-width: 560px;\">\n                    <table class=\"row\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"width:100%;\">\n                        <tr>\n                            <td style=\"font-family: 'Helvetica', 'Arial', sans-serif;\">\n                                <table class=\"row\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"width:100%;\">\n                                    <tr>\n                                        <td style=\"padding-bottom:12px; vertical-align: middle; width: 1%;\">\n                                            <img style=\"max-width: 100px; padding-left: 1px;\" src=\"https://mein.fairgate.ch/uploads/1127/admin/clublogo_100/logo.jpg\" />\n                                        </td>\n                                        <td style=\"width: 28px;\"></td>\n                                        <td style=\"font-family: 'Helvetica', 'Arial', sans-serif; vertical-align: middle;\">\n                                            <h1 style=\"margin: 0; font-size: 30px; font-weight: 500; margin-top: -4px;\">RaBe Login</h1>\n                                        </td>\n                                    </tr>\n                                </table>\n                            </td>\n                        </tr>\n                    </table>\n                    <table style=\"background-color:#fff; border:1px solid #e1e1e1; width:100%;\" cellpadding=\"0\" cellspacing=\"0\">\n                        <tr>\n                            <td style=\"padding-bottom: 20px; padding-left: 20px; padding-top: 20px; padding-right: 20px; font-family: 'Helvetica', 'Arial', sans-serif;\">\n                                <div style=\"overflow: hidden;\">\n                                    <p>\n                                        Liebe*r {{ '{{' }} first {{ '}}' }},\n                                    </p>\n                                    <p>\n                                        Das Passwort für dein RaBe-Login {{ '{{' }} uid {{ '}}' }}, um auf das Wiki, den Share, das Archiv usw. zuzugreifen, wird am {{ '{{' }} expiration | datetimeformat('%e. %B %Y %X', 'Europe/Berlin') {{ '}}' }} ablaufen.\n                                    </p>\n                                    <p>\n                                        Du kannst es ganz einfach mit unserem Self-Service unter <a href=\"https://my.rabe.ch\" style=\"text-decoration: none; color:#2da6cb;\">my.rabe.ch</a> erneuern.\n                                        Siehe auch <a href=\"https://wiki.rabe.ch/Erste_Schritte\" style=\"text-decoration: none; color:#2da6cb;\">wiki.rabe.ch/Erste_Schritte</a> in unserem Wiki.\n                                    </p>\n                                    <p>Liebe Grüsse</p>\n                                    <p><a href=\"mailto:it@rabe.ch\" style=\"text-decoration: none; color:#2da6cb;\">RaBe IT-Reaktion</a></p>\n                                    <p>\n                                        <table style=\"border: 2px solid #005C63; border-radius: 6px; color:#00454D; background-color:#98EAE1\"; width:100%;\" cellpadding=\"0\" cellspacing=\"0\">\n                                            <tr>\n                                                <td style=\"padding-left: 10px; padding-right: 10px; padding-top: 10px;\">\n                                                    <svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                                                        <circle cx=\"12\" cy=\"\
            12\" r=\"10\"></circle>\n                                                        <line x1=\"12\" y1=\"16\" x2=\"12\" y2=\"12\"></line>\n                                                        <line x1=\"12\" y1=\"8\" x2=\"12.01\" y2=\"8\"></line>\n                                                    </svg>\n                                                </td>\n                                                <td style=\"padding-right: 10px; padding-top: 10px;\">\n                                                    <div style=\"color:#00454D; font-weight:bold\">Passwort vergessen?</div>\n                                                </td>\n                                            </tr>\n                                            <tr>\n                                                <td></td>\n                                                <td style=\"padding-bottom: 10px; padding-right: 10px;\">\n                                                    <div>\n                                                        Kein Problem! Klicke bei <a href=\"https://my.rabe.ch\" target=\"_blank\" style=\"text-decoration: none; color:#00454D; font-weight:bold;\">my.rabe.ch</a> auf <strong>\"Forgot your password?\"</strong> und gib im darauffolgenden Fenster deinen Benutzernamen ein. Nach dem Klick auf <strong>\"Reset\"</strong> wird dir automatisch eine E-Mail zugestellt. Diese enthält einen Link, über den du dein Passwort neu setzen kannst.\n                                                    </div>\n                                                </td>\n                                            </tr>\n                                        </table>\n                                    </p>\n                                </div>\n                            </td>\n                        </tr>\n                        <tr>\n                            <td>\n                                <hr style=\"border: 0; border-top: 1px solid #e1e1e1; margin: 0;\" />\n                            </td>\n                        </tr>\n                        <tr>\n                            <td style=\"padding-bottom: 20px; padding-left: 20px; padding-top: 20px; padding-right: 20px; font-family: 'Helvetica', 'Arial', sans-serif;\">\n                                <div style=\"overflow: hidden;\">\n                                    <p>\n                                        Dear {{ '{{' }} first {{ '}}' }},\n                                    </p>\n                                    <p>\n                                        The password for your RaBe login {{ '{{' }} uid {{ '}}' }} for accessing the wiki, the share, the archive etc will expire soon on {{ '{{' }} expiration | datetimeformat('%e. %B %Y %X', 'Europe/Berlin') {{ '}}' }}.</p>\n                                    </p>\n                                    <p>\n                                        You can easily renew it using our self-service at <a href=\"https://my.rabe.ch\" style=\"text-decoration: none; color:#2da6cb;\">my.rabe.ch</a>.\n                                        See also <a href=\"https://wiki.rabe.ch/Erste_Schritte\" style=\"text-decoration: none; color:#2da6cb;\">wiki.rabe.ch/Erste_Schritte</a> in our wiki.\n                                    </p>\n                                    <p>Best wishes</p>\n                                    <p><a href=\"mailto:it@rabe.ch\" style=\"text-decoration: none; color:#2da6cb;\">RaBe IT-Reaktion</a></p>\n                                    <p>\n                                        <table style=\"border: 2px solid #005C63; border-radius: 6px; color:#00454D; background-color:#98EAE1\"; width:100%;\" cellpadding=\"0\" cellspacing=\"0\">\n                                            <tr>\n                                                <td style=\"padding-left: 10px; padding-right: 10px; padding-top: 10px;\">\n                                                    <svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"\
            round\">\n                                                        <circle cx=\"12\" cy=\"12\" r=\"10\"></circle>\n                                                        <line x1=\"12\" y1=\"16\" x2=\"12\" y2=\"12\"></line>\n                                                        <line x1=\"12\" y1=\"8\" x2=\"12.01\" y2=\"8\"></line>\n                                                    </svg>\n                                                </td>\n                                                <td style=\"padding-right: 10px; padding-top: 10px;\">\n                                                    <div style=\"color:#00454D; font-weight:bold\">Forgot your password?</div>\n                                                </td>\n                                            </tr>\n                                            <tr>\n                                                <td></td>\n                                                <td style=\"padding-bottom: 10px; padding-right: 10px;\">\n                                                    <div>\n                                                        No problem! Visit <a href=\"https://my.rabe.ch\" target=\"_blank\" style=\"text-decoration: none; color:#00454D; font-weight:bold;\">my.rabe.ch</a>, click on <strong>\"Forgot your password?\"</strong> and enter your username in the window that appears. After clicking <strong>\"Reset\"</strong> an email will be automatically sent to your address. This email contains a link that allows you to set a new password.\n                                                    </div>\n                                                </td>\n                                            </tr>\n                                        </table>\n                                    </p>\n                                </div>\n                            </td>\n                        </tr>\n                    </table>\n                    <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"width:100%\">\n                        <tr>\n                            <td style=\"float:right; padding-top:10px; font-size:12px; display:inline-block; padding-left: 1px; text-align: right; font-family: 'Helvetica', 'Arial', sans-serif;\">\n                                <p>Mailing powered by <a href=\"https://www.rabe.ch\" style=\"text-decoration: none;\">RaBe</a></p>\n                            </td>\n                        </tr>\n                    </table>\n                </center>\n            </td>\n        </tr>\n    </table>\n</body>\n</html>"
          dest: /etc/ipa/epn/expire_msg.template
          mode: '0644'
    - name: smtp_server
      parameter_type: string
      value: "{{ '{{' }} undef('variable smtp_server needs to be set in host') {{ '}}' }}"
    - name: smtp_user
      parameter_type: string
      value: "{{ '{{' }} undef('variable smtp_user needs to be set in host') {{ '}}' }}"
    - name: smtp_password
      parameter_type: string
      value: "{{ '{{' }} undef('variable smtp_password needs to be set in host') {{ '}}' }}"
    - name: smtp_admin
      parameter_type: string
      value: it@rabe.ch
    - name: mail_from
      parameter_type: string
      value: it@rabe.ch
    - name: mail_from_name
      parameter_type: string
      value: IT-Reaktion
    - name: msg_subject
      parameter_type: string
      value: Dein RaBe Passwort läuft bald ab / Your RaBe password will expire soon
    - name: msg_subtype
      parameter_type: string
      value: html
    - name: radiorabe_files
      parameter_type: yaml
      value:
        - path: "/etc/systemd/system/ipa-epn.timer.d"
          state: directory
          mode: '0755'
    - name: systemd_enabled_units
      parameter_type: yaml
      value:
        - ipa-epn.timer
    - name: systemd_started_units
      parameter_type: yaml
      value:
        - ipa-epn.timer
