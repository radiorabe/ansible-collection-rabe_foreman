---
foreman_hostgroup:
  name: AlmaLinux 9 DMZ Virtualization Server
  description: AlmaLinux 9 general purpose virtual machines.
  parent: RaBe Core/RaBe Base/EL9/AlmaLinux 9
  organization: RaBe
  locations:
    - Sulgenrain
  domain: dmz-admin.int.rabe.ch
  subnet: dmz-admin
  ansible_roles:
    - redhat.rhel_system_roles.network
    - radiorabe.foreman_libvirt.libvirt
    - radiorabe.common.download_file
    - redhat.rhel_system_roles.bootloader
  parameters:
    - name: bootloader_settings
      parameter_type: yaml
      value:
        - kernel: ALL
          options:
            - name: console
              value: tty0
              state: present
            - name: console
              value: ttyS1,115200
              state: present
            - name: splash
              state: absent
            - name: quiet
              state: absent
    - name: download_file_destination
      parameter_type: string
      value: /var/lib/libvirt/images/
    - name: download_file_url
      parameter_type: string
      value:
        https://foreman.service.int.rabe.ch/pulp/content/RaBe/Library/custom/AlmaLinux_OS_Generic_Cloud_Cloud-init_image/AlmaLinux_OS_Generic_Cloud_Cloud-init_image/AlmaLinux-9-GenericCloud-latest.x86_64.qcow2
    - name: remote_execution_ssh_keys
      parameter_type: string
      value: ssh-rsa
        
        foreman@foreman.service.int.rabe.ch
    - name: network_connections
      parameter_type: yaml
      value:
        - name: Bond bond0
          state: up
        - name: dmz
          interface_name: dmz
          type: bridge
          ip:
            dhcp4: false
            auto6: false
        - name: Vlan bond0.133
          interface_name: bond0.133
          type: vlan
          vlan:
            id: "133"
          parent: Bond bond0
          controller: dmz
          port_type: bridge
