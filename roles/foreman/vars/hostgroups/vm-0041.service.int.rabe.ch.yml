---
foreman_hostgroup:
  name: vm-0041.service.int.rabe.ch
  description: AlmaLinux 9 VM for Kanboard project management tool
  parent: RaBe Core/RaBe Base/EL9/AlmaLinux 9/AlmaLinux 9 VMs
  organization: RaBe
  locations:
    - Sulgenrain
  subnet: service-temp
  ansible_roles:
    - radiorabe.common.selinux_modules
    - redhat.rhel_system_roles.certificate
    - radiorabe.common.local_user
    - redhat.rhel_system_roles.kernel_settings
    - radiorabe.common.git_clone
    - radiorabe.common.files
    - redhat.rhel_system_roles.podman
    - radiorabe.podman.zabbix_monitoring
  parameters:
    - name: certificate_requests
      parameter_type: yaml
      value:
        - name: kanboard
          dns:
            - kanboard-new.service.int.rabe.ch
          ca: ipa
          principal: HTTP/kanboard-new.service.int.rabe.ch@INT.RABE.CH
          key_size: 4096
          run_after: |
            /usr/bin/cp /etc/pki/tls/*/kanboard.* /home/kanboard/ssl/
            /usr/bin/chown kanboard: /home/kanboard/ssl/*
            cd /home/kanboard
            /usr/bin/sudo -u kanboard /usr/bin/podman pod restart kanboard
    - name: kanboard_db_password
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_db_password needs to be set in host') {{ '}}' }}"
    - name: kanboard_db_user
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_db_user needs to be set in host') {{ '}}' }}"
    - name: kanboard_ldap_password
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_ldap_password needs to be set in host') {{ '}}' }}"
    - name: kanboard_ldap_server
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_ldap_server needs to be set in host') {{ '}}' }}"
    - name: kanboard_ldap_username
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_ldap_username needs to be set in host') {{ '}}' }}"
    - name: kanboard_mail_smtp_hostname
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_mail_smtp_hostname needs to be set in host') {{ '}}' }}"
    - name: kanboard_mail_smtp_password
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_mail_smtp_password needs to be set in host') {{ '}}' }}"
    - name: kanboard_mail_smtp_username
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_mail_smtp_username needs to be set in host') {{ '}}' }}"
    - name: kanboard_reverse_proxy_default_admin
      parameter_type: string
      value: "{{ '{{' }} undef('variable kanboard_reverse_proxy_default_admin needs to be set in host') {{ '}}' }}"
    - name: kernel_settings_sysctl
      parameter_type: yaml
      value:
        - name: net.ipv4.ip_unprivileged_port_start
          value: 80
    - name: local_user_username
      parameter_type: string
      value: kanboard
    - name: podman_containers_conf
      parameter_type: yaml
      value:
        containers:
          log_driver: k8s-file
          log_size_max: 1073741824
    - name: podman_create_host_directories
      parameter_type: boolean
      value: true
    - name: podman_firewall
      parameter_type: yaml
      value:
        - service:
            - http
            - https
          state: enabled
    - name: podman_kube_specs
      parameter_type: yaml
      value:
        - kube_file_content:
            apiVersion: v1
            kind: Pod
            metadata:
              name: kanboard
            spec:
              containers:
                - env:
                    - name: DEBUG
                      value: false
                    - name: LOG_DRIVER
                      value: system
                    - name: DB_DRIVER
                      value: postgres
                    - name: DB_USERNAME
                      value: "{{ '{{' }} kanboard_db_user {{ '}}' }}"
                    - name: DB_PASSWORD
                      value: "{{ '{{' }} kanboard_db_password {{ '}}' }}"
                    - name: DB_HOSTNAME
                      value: postgresql.service.int.rabe.ch
                    - name: DB_NAME
                      value: kanboard
                    - name: PLUGIN_INSTALLER
                      value: true
                    - name: MAIL_FROM
                      value: kanboard@service.int.rabe.ch
                    - name: MAIL_TRANSPORT
                      value: smtp
                    - name: MAIL_SMTP_HOSTNAME
                      value: "{{ '{{' }} kanboard_mail_smtp_hostname {{ '}}' }}"
                    - name: MAIL_SMTP_USERNAME
                      value: "{{ '{{' }} kanboard_mail_smtp_username {{ '}}' }}"
                    - name: MAIL_SMTP_PASSWORD
                      value: "{{ '{{' }} kanboard_mail_smtp_password {{ '}}' }}"
                    - name: LDAP_SERVER
                      value: "{{ '{{' }} kanboard_ldap_server {{ '}}' }}"
                    - name: LDAP_BIND_TYPE
                      value: proxy
                    - name: LDAP_USERNAME
                      value: "{{ '{{' }} kanboard_ldap_username {{ '}}' }}"
                    - name: LDAP_PASSWORD
                      value: "{{ '{{' }} kanboard_ldap_password {{ '}}' }}"
                    - name: LDAP_USER_BASE_DN
                      value: cn=users,cn=accounts,dc=int,dc=rabe,dc=ch
                    - name: LDAP_USER_FILTER
                      value: uid=%s
                    - name: LDAP_GROUP_ADMIN_DN
                      value: cn=kanboard-admins,cn=groups,cn=accounts,dc=int,dc=rabe,dc=ch
                    - name: LDAP_GROUP_MANAGER_DN
                      value: cn=kanboard-managers,cn=groups,cn=accounts,dc=int,dc=rabe,dc=ch
                    - name: LDAP_GROUP_PROVIDER
                      value: true
                    - name: LDAP_GROUP_BASE_DN
                      value: cn=groups,cn=accounts,dc=int,dc=rabe,dc=ch
                    - name: LDAP_GROUP_FILTER
                      value: (&(objectClass=groupofnames)(cn=%s*))
                    - name: TRUSTED_PROXY_NETWORKS
                      value: 10.88.0.0/16
                    - name: REVERSE_PROXY_AUTH
                      value: true
                    - name: REVERSE_PROXY_DEFAULT_ADMIN
                      value: "{{ '{{' }} kanboard_reverse_proxy_default_admin {{ '}}' }}"
                    - name: REMEMBER_ME_AUTH
                      value: false
                    - name: ENABLE_URL_REWRITE
                      value: true
                    - name: HIDE_LOGIN_FORM
                      value: true
                    - name: DISABLE_LOGOUT
                      value: true
                  image: quay.io/kanboard/kanboard:v1.2.51
                  name: kanboard
                  ports:
                    - containerPort: 80
                      hostPort: 80
                    - containerPort: 443
                      hostPort: 443
                  restart: always
                  volumeMounts:
                    - mountPath: /var/www/app/data:Z
                      name: kanboard_data
                    - mountPath: /var/www/app/plugins:Z
                      name: kanboard_plugins
                    - mountPath: /etc/nginx/ssl:ro,Z
                      name: kanboard_ssl
                    - mountPath: /etc/ssl/certs/ca-certificates.crt:ro
                      name: ca_certs
                    - mountPath: /etc/php84/conf.d/z.ini:ro,Z
                      name: php_fpm_ini
              volumes:
                - hostPath:
                    path: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/data"
                    type: Directory
                  name: kanboard_data
                - hostPath:
                    path: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins"
                    type: Directory
                  name: kanboard_plugins
                - hostPath:
                    path: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/ssl"
                    type: Directory
                  name: kanboard_ssl
                - hostPath:
                    path: /etc/pki/ca-trust/extracted/openssl/ca-bundle.trust.crt
                    type: File
                  name: ca_certs
                - hostPath:
                    path: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/phpfpm_conf.d/z.ini"
                    type: File
                  name: php_fpm_ini
          state: started
    - name: podman_run_as_group
      parameter_type: string
      value: kanboard
    - name: podman_run_as_user
      parameter_type: string
      value: kanboard
    - name: podman_selinux_ports
      parameter_type: yaml
      value:
        - ports: 80
          setype: http_port_t
        - ports: 443
          setype: http_port_t
    - name: rabe_backup_include_paths
      parameter_type: yaml
      value:
        - /home/kanboard
    - name: radiorabe_copies
      parameter_type: yaml
      value:
        - content: display_errors = Off
          dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/phpfpm_conf.d/z.ini"
          group: "{{ '{{' }} podman_run_as_group {{ '}}' }}"
          mode: '0644'
          owner: "{{ '{{' }} podman_run_as_user {{ '}}' }}"
        - content: |-
            [safe]
              directory = /home/kanboard/plugins/*
          dest: $HOME/.gitconfig
          mode: '0644'
    - name: radiorabe_files
      parameter_type: yaml
      value:
        - group: "{{ '{{' }} podman_run_as_group {{ '}}' }}"
          mode: '0755'
          owner: "{{ '{{' }} podman_run_as_user {{ '}}' }}"
          path: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/phpfpm_conf.d/"
          state: directory
        - group: "{{ '{{' }} podman_run_as_group {{ '}}' }}"
          mode: '0755'
          owner: "{{ '{{' }} podman_run_as_user {{ '}}' }}"
          path: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/"
          recurse: true
          state: directory
    - name: radiorabe_git_clone
      parameter_type: yaml
      value:
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/Calendar"
          force: true
          repo: https://codeberg.org/abu/Calendar.git
          single_branch: true
          version: refs/tags/v1.5.0
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/Customizer"
          force: true
          repo: https://github.com/creecros/Customizer.git
          single_branch: true
          version: refs/tags/1.14.2
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/ExtendedMail"
          force: true
          repo: https://github.com/atcomputing/kanboard-ExtendedMail.git
          single_branch: true
          version: refs/tags/v0.8
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/Gantt"
          force: true
          repo: https://github.com/kanboard/plugin-gantt.git
          single_branch: true
          version: refs/tags/v1.0.6
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/HighlightCodeSyntax"
          force: true
          repo: https://github.com/kenlog/HighlightCodeSyntax.git
          single_branch: true
          version: refs/tags/v1.0.3
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/OAuth2"
          force: true
          repo: https://github.com/kanboard/plugin-oauth2.git
          single_branch: true
          version: refs/tags/v1.0.2
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/RaBe"
          force: true
          repo: https://github.com/radiorabe/kanboard-theme-rabe.git
          single_branch: true
          version: main
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/SendEmailCreator"
          force: true
          repo: https://github.com/creecros/SendEmailCreator.git
          single_branch: true
          version: refs/tags/1.2.6
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/Task2pdf"
          force: true
          repo: https://github.com/creecros/Task2pdf.git
          single_branch: true
          version: refs/tags/1.8.0
        - dest: "/home/{{ '{{' }} podman_run_as_user {{ '}}' }}/plugins/WysiwygMDEditor"
          force: true
          repo: https://github.com/imfx77/kanboard-plugin-Wysiwyg-MD-Editor.git
          single_branch: true
          version: refs/tags/v0.9.8
    - name: selinux_booleans
      parameter_type: yaml
      value:
        - name: container_read_certs
          state: true
          persistent: true
    - name: selinux_fcontexts
      parameter_type: yaml
      value:
        - target: /etc/certmonger/post-scripts(/.*)?
          setype: certmonger_unconfined_exec_t
          ftype: f
          state: present
    - name: selinux_restore_dirs
      parameter_type: yaml
      value:
        - /etc/certmonger/post-scripts/
    - name: zabbix_monitoring_podman_user
      parameter_type: string
      value: "{{ '{{' }} podman_run_as_user {{ '}}' }}"
